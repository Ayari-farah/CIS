<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6">Projects</h1>
  <div *ngIf="isLoading" class="text-center">Loading...</div>
  <div *ngIf="errorMessage" class="text-red-600">{{ errorMessage }}</div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let project of projects" class="bg-white shadow rounded-lg p-4">
      <h3 class="font-bold">{{ project.title }}</h3>
      <p class="text-sm text-gray-600">Goal: {{ project.goalAmount | currency }}</p>
      <p class="text-sm text-gray-600">Current: {{ project.currentAmount | currency }}</p>
      <p class="text-sm">Votes: {{ project.voteCount }}</p>
      <button (click)="vote(project)" class="mt-2 bg-green-600 text-white px-3 py-1 rounded text-sm">Vote</button>
      <a [routerLink]="['/projects', project.id]" class="block mt-2 text-indigo-600">View Details →</a>
    </div>
  </div>
</div>
