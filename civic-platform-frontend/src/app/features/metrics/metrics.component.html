<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6">Metrics Dashboard</h1>
  <div *ngIf="isLoading" class="text-center">Loading...</div>
  <div *ngIf="errorMessage" class="text-red-600">{{ errorMessage }}</div>
  <button (click)="exportPdf()" class="mb-4 bg-indigo-600 text-white px-4 py-2 rounded">Export PDF</button>
  <div *ngIf="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white shadow rounded-lg p-4">
      <p class="text-sm text-gray-600">Total Projects</p>
      <p class="text-2xl font-bold">{{ stats.totalProjects }}</p>
    </div>
    <div class="bg-white shadow rounded-lg p-4">
      <p class="text-sm text-gray-600">Total Events</p>
      <p class="text-2xl font-bold">{{ stats.totalEvents }}</p>
    </div>
    <div class="bg-white shadow rounded-lg p-4">
      <p class="text-sm text-gray-600">Active Volunteers</p>
      <p class="text-2xl font-bold">{{ stats.activeVolunteers }}</p>
    </div>
    <div class="bg-white shadow rounded-lg p-4">
      <p class="text-sm text-gray-600">Total Funding</p>
      <p class="text-2xl font-bold">{{ stats.totalFundingAmount | currency }}</p>
    </div>
  </div>
</div>
