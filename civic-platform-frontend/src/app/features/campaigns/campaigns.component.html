<div class="container mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Campaigns</h1>
    <a routerLink="/campaigns/new" class="bg-indigo-600 text-white px-4 py-2 rounded">New Campaign</a>
  </div>
  <div *ngIf="isLoading" class="text-center">Loading...</div>
  <div *ngIf="errorMessage" class="text-red-600">{{ errorMessage }}</div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let campaign of campaigns" class="bg-white shadow rounded-lg p-4">
      <h3 class="font-bold">{{ campaign.name }}</h3>
      <p class="text-sm text-gray-600">{{ campaign.type }}</p>
      <span class="px-2 py-1 rounded text-xs" [ngClass]="getStatusColor(campaign.status)">{{ campaign.status }}</span>
      <a [routerLink]="['/campaigns', campaign.id]" class="block mt-2 text-indigo-600">View Details →</a>
    </div>
  </div>
</div>
