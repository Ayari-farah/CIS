<div class="container mx-auto px-4 py-8">
  <a routerLink="/campaigns" class="text-indigo-600">← Back to Campaigns</a>
  <h1 class="text-2xl font-bold mt-4">Create Campaign</h1>
  <form [formGroup]="campaignForm" (ngSubmit)="onSubmit()" class="max-w-lg mt-4">
    <div class="mb-4">
      <label class="block text-sm font-medium">Name</label>
      <input type="text" formControlName="name" class="w-full border rounded px-3 py-2">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Type</label>
      <select formControlName="type" class="w-full border rounded px-3 py-2">
        <option *ngFor="let type of campaignTypes" [value]="type">{{ type }}</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Description</label>
      <textarea formControlName="description" class="w-full border rounded px-3 py-2"></textarea>
    </div>
    <button type="submit" [disabled]="isLoading" class="bg-indigo-600 text-white px-4 py-2 rounded">
      {{ isLoading ? 'Creating...' : 'Create Campaign' }}
    </button>
    <div *ngIf="errorMessage" class="text-red-600 mt-2">{{ errorMessage }}</div>
  </form>
</div>
