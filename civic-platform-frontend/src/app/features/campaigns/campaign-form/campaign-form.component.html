<div [ngClass]="isAdminRoute() ? 'min-h-screen bg-slate-100 py-8 px-4 sm:px-6 lg:px-8' : 'min-h-screen bg-gradient-to-br from-emerald-50 via-white to-emerald-50 py-8 px-4 sm:px-6 lg:px-8'">
  <div [ngClass]="isAdminRoute() ? 'max-w-2xl mx-auto rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden' : 'max-w-2xl mx-auto'">
    <div *ngIf="isAdminRoute()" class="bg-slate-800 px-6 py-4 text-white">
      <p class="text-xs font-bold uppercase tracking-wider text-slate-300">Campaigns</p>
      <h1 class="text-xl font-bold">{{ isEdit ? 'Edit campaign' : 'New campaign' }}</h1>
      <p class="text-slate-300 text-sm mt-1">Create or edit — saved via the campaigns API.</p>
    </div>
    <div [ngClass]="isAdminRoute() ? 'p-6' : ''">
    <nav *ngIf="!isAdminRoute()" class="flex items-center space-x-2 text-sm text-gray-500 mb-6">
      <a routerLink="/campaigns" class="hover:text-emerald-600 transition-colors">← Campaigns</a>
    </nav>
    <nav *ngIf="isAdminRoute()" class="mb-6 text-sm text-slate-500">
      <a [routerLink]="campaignsListPath()" class="font-semibold text-slate-700 hover:text-slate-900">← Back to campaigns</a>
    </nav>

    <h2 *ngIf="!isAdminRoute()" class="text-2xl font-bold text-gray-900 mb-6">{{ isEdit ? 'Edit campaign' : 'New campaign' }}</h2>

    <form [formGroup]="campaignForm" (ngSubmit)="onSubmit()" [ngClass]="isAdminRoute() ? 'space-y-5' : 'bg-white rounded-2xl shadow-md border border-gray-100 p-6 space-y-5'">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-500">*</span></label>
        <input type="text" formControlName="name" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
        <p *ngIf="campaignForm.get('name')?.touched && campaignForm.get('name')?.hasError('required')" class="text-red-600 text-xs mt-1">Required</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type <span class="text-red-500">*</span></label>
        <select formControlName="type" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500 bg-white">
          <option *ngFor="let type of campaignTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
        <textarea formControlName="description" rows="4" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></textarea>
        <p *ngIf="campaignForm.get('description')?.touched && campaignForm.get('description')?.hasError('required')" class="text-red-600 text-xs mt-1">Required</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Hashtag</label>
        <input type="text" formControlName="hashtag" placeholder="#MyCampaign" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Amount needed (TND) <span class="text-red-500">*</span></label>
        <input type="number" step="1" min="1" formControlName="neededAmount" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
        <p *ngIf="campaignForm.get('neededAmount')?.touched && campaignForm.get('neededAmount')?.invalid" class="text-red-600 text-xs mt-1">Enter an amount ≥ 1 TND</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Goal kg (optional)</label>
          <input type="number" min="0" formControlName="goalKg" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Goal meals (optional)</label>
          <input type="number" min="0" formControlName="goalMeals" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start date <span class="text-red-500">*</span></label>
          <input type="date" formControlName="startDate" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End date <span class="text-red-500">*</span></label>
          <input type="date" formControlName="endDate" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:ring-emerald-500" />
        </div>
      </div>
      <p *ngIf="campaignForm.hasError('dateOrder') && campaignForm.touched" class="text-red-600 text-sm">End date must be after start date.</p>

      <div class="flex flex-wrap gap-3 pt-2">
        <button
          type="submit"
          [disabled]="isLoading"
          [ngClass]="isAdminRoute()
            ? 'inline-flex items-center px-6 py-3 rounded-xl font-bold text-sm text-white bg-slate-800 hover:bg-slate-900 disabled:opacity-50'
            : 'inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50'">
          {{ isLoading ? '…' : 'Save' }}
        </button>
        <button type="button" (click)="cancel()" class="inline-flex items-center px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 bg-white hover:bg-slate-50">
          Cancel
        </button>
      </div>

      <div *ngIf="errorMessage" class="text-red-600 text-sm">{{ errorMessage }}</div>
    </form>
    </div>
  </div>
</div>
