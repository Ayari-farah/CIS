<div class="container mx-auto px-4 py-8">
  <a routerLink="/campaigns" class="text-indigo-600">← Back to Campaigns</a>
  <div *ngIf="isLoading" class="text-center py-8">Loading...</div>
  <div *ngIf="campaign && !isLoading" class="bg-white shadow rounded-lg p-6 mt-4">
    <h1 class="text-2xl font-bold">{{ campaign.name }}</h1>
    <p class="text-gray-600 mt-2">{{ campaign.description }}</p>
    <div class="mt-4 flex gap-2">
      <button (click)="vote()" class="bg-green-600 text-white px-4 py-2 rounded">Vote ({{ campaign.voteCount || 0 }})</button>
    </div>
  </div>
</div>
