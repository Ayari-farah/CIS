<div class="container mx-auto px-4 py-8">
  <a routerLink="/posts" class="text-indigo-600">← Back to Posts</a>
  <div *ngIf="isLoading" class="text-center py-8">Loading...</div>
  <div *ngIf="post && !isLoading" class="bg-white shadow rounded-lg p-6 mt-4">
    <h1 class="text-xl font-bold">{{ post.creator }}</h1>
    <p class="text-gray-500 text-sm">{{ post.createdAt | date }}</p>
    <p class="mt-4">{{ post.content }}</p>
    <button (click)="likePost()" class="mt-4 text-indigo-600">Like ({{ post.likesCount }})</button>
    
    <div class="mt-6 border-t pt-4">
      <h3 class="font-bold">Comments</h3>
      <div *ngFor="let comment of comments" class="mt-2 p-2 bg-gray-50 rounded">
        <span class="font-semibold">{{ comment.authorName }}</span>
        <p>{{ comment.content }}</p>
      </div>
      <form [formGroup]="commentForm" (ngSubmit)="addComment()" class="mt-4">
        <textarea formControlName="content" class="w-full border rounded px-3 py-2" placeholder="Add a comment..."></textarea>
        <button type="submit" class="mt-2 bg-indigo-600 text-white px-4 py-2 rounded">Comment</button>
      </form>
    </div>
  </div>
</div>
